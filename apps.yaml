# apps.yaml — registry of admin-panel sources to scrape.
#
# This replaces the hard-coded APP_IDS / CREDENTIALS dicts in the old
# config.py. Each scheduled scrape iterates every entry whose
# schema_status is `canonical` (or `pending_review` if explicitly opted
# in by a super admin via the admin UI).
#
# Add new entries via the Streamlit admin UI at /admin. The UI will:
#   1. append APP_N_USER / APP_N_PASS to the CREDS GitHub secret
#   2. add the new app here
#   3. run a dry scrape to check schema drift
#
# You CAN hand-edit this file for emergencies, but the UI is the
# intended path — it keeps the CREDS secret in sync.

schema_version: 1

