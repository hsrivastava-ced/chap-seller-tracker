# =============================================================================
#  cHAP Seller Tracker — unattended scrape
#  ---------------------------------------------------------------------------
#  Runs scraper.py on GitHub-hosted Ubuntu runners twice daily (12 AM + 12 PM
#  IST), commits the freshly-scraped results/ directory back to the repo on
#  `main`. Streamlit Cloud listens for the push and auto-redeploys the
#  dashboard, so stakeholders see new data within a few minutes of each run.
#
#  Layout assumption
#  -----------------
#  This workflow lives at  `.github/workflows/scrape.yml`  in a repo whose
#  root looks like:
#
#      chap-seller-tracker/
#      ├── .github/workflows/scrape.yml
#      ├── scraper.py
#      ├── dashboard.py
#      ├── requirements.txt
#      ├── analytics_advanced.py
#      ├── results/
#      └── …
#
#  i.e. the Python files live at the repo root (not nested inside an "Admin
#  Panel Scrapper/" subfolder). That matches how the Streamlit Cloud app is
#  configured (main file: `dashboard.py`) and is what caused the earlier
#  run to fail with "No file in … matched to Admin Panel Scrapper/requirements.txt".
#
#  Secrets required (Settings → Secrets and variables → Actions):
#      LOGIN_URL
#      APP_1_ID, APP_1_USER, APP_1_PASS          # shopify_temu (TEMU US)
#      APP_2_ID, APP_2_USER, APP_2_PASS          # shein
#      APP_3_ID, APP_3_USER, APP_3_PASS          # shopify_temu_eu
#      SUPABASE_URL, SUPABASE_KEY                # (optional)
#
#  Schedule (both UTC — GitHub Actions cron is always UTC):
#      30 18 * * *   → 00:00 IST (midnight India)
#      30 06 * * *   → 12:00 IST (noon India)
# =============================================================================

name: scrape-chap

on:
  schedule:
    - cron: "30 18 * * *"   # 00:00 IST = previous-day 18:30 UTC
    - cron: "30 6 * * *"    # 12:00 IST = same-day 06:30 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual run?"
        required: false
        default: "on-demand"

concurrency:
  group: scrape-chap-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape and commit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
      HEADLESS: "true"
      LOGIN_URL: ${{ secrets.LOGIN_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Single bundled secret holding the 9 per-app env lines
      # (APP_1_ID/USER/PASS ... APP_3_ID/USER/PASS) in dotenv format.
      # Easier for humans to paste once than to click 9 separate secrets.
      # Unpacked into the shell env by the "Run scraper" step.
      CREDS: ${{ secrets.CREDS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium + OS deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        # scraper.py writes results/latest/ and results/history/<stamp>/.
        # On non-zero exit the job fails and nothing is committed — the
        # prior snapshot stays authoritative until the next successful run.
        #
        # The CREDS secret is a bundled dotenv-style block holding the 9
        # per-app values (APP_1_ID/USER/PASS through APP_3_*). We source
        # it into the current shell so scraper.py's `config.py`
        # (load_dotenv + os.getenv) resolves every app.
        shell: bash
        run: |
          set -e
          if [ -z "${CREDS:-}" ]; then
            echo "::error::CREDS secret is empty — set it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # `set -a` auto-exports every var sourced below. The CREDS
          # value uses KEY="value" lines, which `source` parses natively.
          set -a
          source <(printf '%s\n' "$CREDS")
          set +a
          # Sanity: if even one required key is still empty, bail loud.
          missing=()
          for v in APP_1_ID APP_1_USER APP_1_PASS \
                   APP_2_ID APP_2_USER APP_2_PASS \
                   APP_3_ID APP_3_USER APP_3_PASS ; do
            if [ -z "${!v:-}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::CREDS is missing keys: ${missing[*]}"
            exit 1
          fi
          python scraper.py

      - name: Summarize fresh run
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("results/latest/run.json")
          if not p.exists():
              print("run.json missing — scraper likely failed")
              raise SystemExit(1)
          data = json.loads(p.read_text())
          print("run stamp:", data.get("run_stamp"))
          for name, rows in (data.get("data") or {}).items():
              plans = sum(1 for r in rows if (r.get("plan") or "").strip())
              print(f"  {name}: {len(rows)} rows, plan populated {plans}/{len(rows)}")
          PY

      - name: Commit results back to main
        run: |
          git config user.name "chap-scraper-bot"
          git config user.email "chap-scraper-bot@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No changes in results/ — skipping commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d_%H-%M-%SZ")
          git commit -m "chore(data): scrape ${STAMP}"
          git push origin HEAD:main

      - name: Upload logs + debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_id }}
          path: |
            debug_dom_*.txt
            error_*.png
            logs/
          if-no-files-found: ignore
          retention-days: 14
