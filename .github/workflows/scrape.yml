# =============================================================================
#  cHAP Seller Tracker — unattended scrape
#  ---------------------------------------------------------------------------
#  Runs scraper.py on GitHub-hosted Ubuntu runners twice daily (12 AM + 12 PM
#  IST), commits the freshly-scraped results/ directory back to the repo on
#  `main`. Streamlit Cloud listens for the push and auto-redeploys the
#  dashboard, so stakeholders see new data within a few minutes of each run.
#
#  Layout assumption
#  -----------------
#  This workflow lives at  `.github/workflows/scrape.yml`  in a repo whose
#  root looks like:
#
#      chap-seller-tracker/
#      ├── .github/workflows/scrape.yml
#      ├── scraper.py
#      ├── dashboard.py
#      ├── requirements.txt
#      ├── analytics_advanced.py
#      ├── results/
#      └── …
#
#  i.e. the Python files live at the repo root (not nested inside an "Admin
#  Panel Scrapper/" subfolder). That matches how the Streamlit Cloud app is
#  configured (main file: `dashboard.py`) and is what caused the earlier
#  run to fail with "No file in … matched to Admin Panel Scrapper/requirements.txt".
#
#  Secrets required (Settings → Secrets and variables → Actions):
#      LOGIN_URL
#      APP_1_ID, APP_1_USER, APP_1_PASS          # shopify_temu (TEMU US)
#      APP_2_ID, APP_2_USER, APP_2_PASS          # shein
#      APP_3_ID, APP_3_USER, APP_3_PASS          # shopify_temu_eu
#      SUPABASE_URL, SUPABASE_KEY                # (optional)
#
#  Schedule (both UTC — GitHub Actions cron is always UTC):
#      30 18 * * *   → 00:00 IST (midnight India)
#      30 06 * * *   → 12:00 IST (noon India)
# =============================================================================

name: scrape-chap

on:
  schedule:
    - cron: "30 18 * * *"   # 00:00 IST = previous-day 18:30 UTC
    - cron: "30 6 * * *"    # 12:00 IST = same-day 06:30 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual run?"
        required: false
        default: "on-demand"
      target_app:
        description: "Limit scrape to this app id (leave blank to scrape all)"
        required: false
        default: ""

concurrency:
  group: scrape-chap-${{ github.ref }}
  # Queue, don't cancel. Scrapes gather data — cancelling a run that's
  # already logged into cHAP and paginated through sellers would drop
  # work we can't replay cheaply. The admin-UI onboarding flow dispatches
  # a scrape, and if the super admin then clicks "Run scrape now" before
  # it finishes, we want BOTH runs to execute (queued), not the newer
  # one stomping the first.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape and commit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
      HEADLESS: "true"
      # Credentials (LOGIN_URL, APP_*_*, SUPABASE_*) are unpacked from the
      # bundled CREDS secret (and top-level LOGIN_URL/SUPABASE_* secrets
      # as fallbacks) by the "Unpack CREDS into job env" step below. That
      # step writes to $GITHUB_ENV so every subsequent step inherits them,
      # without ever letting bash see the raw values (which can contain
      # `$`, backticks, and other shell-special characters).
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium + OS deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Unpack repo secrets into job env
        # Each app's credentials live in their own repo secrets
        # (APP_N_USER, APP_N_PASS) — admin_ui.py writes them directly
        # on onboard via the Actions Secrets API. We expose ALL repo
        # secrets via `toJSON(secrets)` and then filter to the ones
        # apps.yaml expects, so the workflow scales automatically as
        # new apps land without ever touching scrape.yml.
        #
        # Why Python, not bash: passwords legitimately contain `$`,
        # backticks, backslashes; shell `source`/`eval` would mangle
        # them silently. Python reads the JSON verbatim, then writes
        # KEY<<DELIM heredocs to $GITHUB_ENV — GitHub doesn't do any
        # shell interpolation on that file, so values round-trip intact.
        #
        # Legacy fallback: if individual APP_N_* secrets aren't set but
        # the old CREDS bundle secret is, we parse that too. This gives
        # pre-migration setups one more successful run while the admin
        # completes the cut-over to individual secrets.
        shell: bash
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -e
          python - <<'PY'
          import os, json, re, sys, secrets as _secrets

          data = json.loads(os.environ.get("SECRETS_JSON") or "{}")

          # Derive required env var names from apps.yaml so onboarding
          # a new app never requires a workflow edit.
          import yaml
          try:
              registry = yaml.safe_load(open("apps.yaml")) or {}
          except Exception as err:
              print(f"::error::Couldn't read apps.yaml: {err}")
              sys.exit(1)
          required = ["LOGIN_URL"]
          for app in (registry.get("apps") or []):
              ref = (app.get("creds_ref") or "").strip()
              if ref:
                  required.extend([f"{ref}_USER", f"{ref}_PASS"])

          # Start with whatever is in individual repo secrets.
          unpacked = {k: data[k] for k in required if data.get(k)}

          # Legacy fallback: fill any still-missing keys from a CREDS
          # bundle if it exists. Harmless once everything is migrated to
          # individual secrets — the bundle just won't be parsed.
          if any(k not in unpacked for k in required):
              creds = data.get("CREDS") or ""
              if creds.strip():
                  line_re = re.compile(
                      r'^\s*(?:export\s+)?([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.*?)\s*$'
                  )
                  for raw in creds.splitlines():
                      line = raw.rstrip("\r")
                      if not line.strip() or line.lstrip().startswith("#"):
                          continue
                      m = line_re.match(line)
                      if not m:
                          continue
                      k, v = m.group(1), m.group(2)
                      if len(v) >= 2 and v[0] == v[-1] and v[0] in ('"', "'"):
                          v = v[1:-1]
                      unpacked.setdefault(k, v)

          # Preflight: fail loudly with actionable guidance.
          missing = [k for k in required if not unpacked.get(k)]
          if missing:
              print(f"::error::Missing required secrets: {', '.join(missing)}")
              print("::error::Add each one under Settings → Secrets and variables → Actions, or re-run the admin UI 'Add new app' form for the affected app(s).")
              sys.exit(1)

          # Write to $GITHUB_ENV as multiline heredocs so any password
          # character round-trips intact.
          gh_env = os.environ.get("GITHUB_ENV")
          if not gh_env:
              print("::error::GITHUB_ENV not set — are we running on GitHub Actions?")
              sys.exit(1)

          with open(gh_env, "a", encoding="utf-8") as f:
              for k, v in unpacked.items():
                  delim = "EOF_" + _secrets.token_hex(8)
                  while delim in (v or ""):
                      delim = "EOF_" + _secrets.token_hex(8)
                  f.write(f"{k}<<{delim}\n{v}\n{delim}\n")

          # Diagnostic: key names and value lengths only — never log values.
          print("Unpacked keys (value lengths only):")
          for k in sorted(unpacked):
              print(f"  {k}: len={len(unpacked[k])}")
          PY

      - name: Run pipeline (scrape + Supabase push + analytics)
        # pipeline.py wraps scraper.main() with the Supabase push step
        # and the analytics report. Calling pipeline.py (not scraper.py
        # directly) is what populates the `snapshots` table that the
        # Customer Intelligence "What changed" delta feed reads. If
        # Supabase env is missing or unreachable the pipeline degrades
        # to dry-run cleanly — local CSV+JSON still get written, and
        # the markdown report still lands in results/reports/.
        #
        # On non-zero exit the job fails and nothing is committed — the
        # prior snapshot stays authoritative until the next successful run.
        # Credentials are inherited from $GITHUB_ENV set in the previous
        # step; config.py's os.getenv() picks them up directly, and
        # python-dotenv's load_dotenv() is a no-op (it never overrides
        # existing env vars unless override=True is passed).
        #
        # TARGET_APP env var (from workflow_dispatch input) lets admin-UI
        # dispatches scope the run to a single app so onboarding a new
        # panel doesn't re-scrape every existing app and hammer cHAP's
        # MongoDB. Empty → scrape everything (scheduled runs).
        shell: bash
        env:
          TARGET_APP: ${{ inputs.target_app }}
        run: |
          set -e
          python pipeline.py

      - name: Summarize fresh run
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("results/latest/run.json")
          if not p.exists():
              print("run.json missing — scraper likely failed")
              raise SystemExit(1)
          data = json.loads(p.read_text())
          print("run stamp:", data.get("run_stamp"))
          for name, rows in (data.get("data") or {}).items():
              plans = sum(1 for r in rows if (r.get("plan") or "").strip())
              print(f"  {name}: {len(rows)} rows, plan populated {plans}/{len(rows)}")
          PY

      - name: Commit results back to main
        run: |
          git config user.name "chap-scraper-bot"
          git config user.email "chap-scraper-bot@users.noreply.github.com"
          # Also stage apps.yaml — the scraper writes discovered framework
          # lists back to it (frameworks: ["auto"] → real list) and we
          # want that persisted so subsequent runs skip the discovery
          # click. Other changes to apps.yaml come from admin UI commits
          # via the GitHub API and are harmless to re-include here.
          git add results/ apps.yaml
          if git diff --cached --quiet; then
            echo "No changes in results/ or apps.yaml — skipping commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d_%H-%M-%SZ")
          git commit -m "chore(data): scrape ${STAMP}"
          git push origin HEAD:main

      - name: Upload logs + debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_id }}
          path: |
            debug_dom_*.txt
            error_*.png
            logs/
          if-no-files-found: ignore
          retention-days: 14
