# =============================================================================
#  cHAP Seller Tracker — unattended scrape
#  ---------------------------------------------------------------------------
#  Runs scraper.py on GitHub-hosted Ubuntu runners twice daily (12 AM + 12 PM
#  IST), commits the freshly-scraped results/ directory back to the repo on
#  `main`. Streamlit Cloud listens for the push and auto-redeploys the
#  dashboard, so stakeholders see new data within a few minutes of each run.
#
#  Layout assumption
#  -----------------
#  This workflow lives at  `.github/workflows/scrape.yml`  in a repo whose
#  root looks like:
#
#      chap-seller-tracker/
#      ├── .github/workflows/scrape.yml
#      ├── scraper.py
#      ├── dashboard.py
#      ├── requirements.txt
#      ├── analytics_advanced.py
#      ├── results/
#      └── …
#
#  i.e. the Python files live at the repo root (not nested inside an "Admin
#  Panel Scrapper/" subfolder). That matches how the Streamlit Cloud app is
#  configured (main file: `dashboard.py`) and is what caused the earlier
#  run to fail with "No file in … matched to Admin Panel Scrapper/requirements.txt".
#
#  Secrets required (Settings → Secrets and variables → Actions):
#      LOGIN_URL
#      APP_1_ID, APP_1_USER, APP_1_PASS          # shopify_temu (TEMU US)
#      APP_2_ID, APP_2_USER, APP_2_PASS          # shein
#      APP_3_ID, APP_3_USER, APP_3_PASS          # shopify_temu_eu
#      SUPABASE_URL, SUPABASE_KEY                # (optional)
#
#  Schedule (both UTC — GitHub Actions cron is always UTC):
#      30 18 * * *   → 00:00 IST (midnight India)
#      30 06 * * *   → 12:00 IST (noon India)
# =============================================================================

name: scrape-chap

on:
  schedule:
    - cron: "30 18 * * *"   # 00:00 IST = previous-day 18:30 UTC
    - cron: "30 6 * * *"    # 12:00 IST = same-day 06:30 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual run?"
        required: false
        default: "on-demand"

concurrency:
  group: scrape-chap-${{ github.ref }}
  # Queue, don't cancel. Scrapes gather data — cancelling a run that's
  # already logged into cHAP and paginated through sellers would drop
  # work we can't replay cheaply. The admin-UI onboarding flow dispatches
  # a scrape, and if the super admin then clicks "Run scrape now" before
  # it finishes, we want BOTH runs to execute (queued), not the newer
  # one stomping the first.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape and commit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
      HEADLESS: "true"
      # Credentials (LOGIN_URL, APP_*_*, SUPABASE_*) are unpacked from the
      # bundled CREDS secret (and top-level LOGIN_URL/SUPABASE_* secrets
      # as fallbacks) by the "Unpack CREDS into job env" step below. That
      # step writes to $GITHUB_ENV so every subsequent step inherits them,
      # without ever letting bash see the raw values (which can contain
      # `$`, backticks, and other shell-special characters).
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium + OS deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Unpack CREDS into job env (Python parse — no shell interpolation)
        # The CREDS secret holds KEY="value" lines (APP_1_ID/USER/PASS
        # through APP_3_*, optionally LOGIN_URL / SUPABASE_*). We parse
        # it in Python rather than `source`ing it in bash because the
        # passwords legitimately contain shell-special characters like
        # `$`, backticks, and backslashes. Bash `source` would interpret
        # e.g. `VY2$pi9AT@%i!1u` as containing a `$pi9AT` variable
        # reference and silently mangle the password to `VY2@%i!1u`,
        # which the login server then rejects.
        #
        # Output: writes each parsed KEY=value to $GITHUB_ENV so the
        # next step's `python scraper.py` sees them via os.getenv().
        # GitHub parses $GITHUB_ENV literally — no shell interpolation —
        # so special characters round-trip intact. We use the multiline
        # heredoc format (KEY<<DELIM ... DELIM) for maximum safety with
        # any character that could appear in a password.
        shell: bash
        env:
          CREDS: ${{ secrets.CREDS }}
          LOGIN_URL_TOP: ${{ secrets.LOGIN_URL }}
          SUPABASE_URL_TOP: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY_TOP: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -e
          python - <<'PY'
          import os, re, sys, secrets as _secrets

          creds = os.environ.get("CREDS", "")
          if not creds.strip():
              print("::error::CREDS secret is empty — set it under Settings → Secrets and variables → Actions.")
              sys.exit(1)

          # Parse dotenv-style KEY=value / KEY="value" / KEY='value' lines.
          # NO shell expansion — values are taken literally.
          parsed = {}
          line_re = re.compile(
              r'^\s*(?:export\s+)?([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.*?)\s*$'
          )
          for raw in creds.splitlines():
              line = raw.rstrip("\r")
              if not line.strip() or line.lstrip().startswith("#"):
                  continue
              m = line_re.match(line)
              if not m:
                  continue
              key, val = m.group(1), m.group(2)
              # Strip surrounding matching quotes, if any.
              if len(val) >= 2 and val[0] == val[-1] and val[0] in ('"', "'"):
                  val = val[1:-1]
              parsed[key] = val

          # Fill in any top-level secrets the CREDS block didn't set.
          for k, envk in (
              ("LOGIN_URL",    "LOGIN_URL_TOP"),
              ("SUPABASE_URL", "SUPABASE_URL_TOP"),
              ("SUPABASE_KEY", "SUPABASE_KEY_TOP"),
          ):
              if not parsed.get(k):
                  v = os.environ.get(envk, "")
                  if v:
                      parsed[k] = v

          # Preflight: fail loudly if anything critical is still missing.
          required = [
              "LOGIN_URL",
              "APP_1_ID", "APP_1_USER", "APP_1_PASS",
              "APP_2_ID", "APP_2_USER", "APP_2_PASS",
              "APP_3_ID", "APP_3_USER", "APP_3_PASS",
          ]
          missing = [k for k in required if not parsed.get(k)]
          if missing:
              print(f"::error::Missing required env keys: {', '.join(missing)}")
              print('::error::Put them inside the CREDS secret as KEY="value" lines, or set LOGIN_URL as its own secret.')
              sys.exit(1)

          # Append to $GITHUB_ENV so subsequent steps inherit these vars.
          # Multiline heredoc syntax: KEY<<DELIMITER \n <value> \n DELIMITER
          # The delimiter must not appear inside the value — use a random
          # per-run token to guarantee that.
          gh_env_path = os.environ.get("GITHUB_ENV")
          if not gh_env_path:
              print("::error::GITHUB_ENV not set — are we running on GitHub Actions?")
              sys.exit(1)

          with open(gh_env_path, "a", encoding="utf-8") as f:
              for k, v in parsed.items():
                  delim = "EOF_" + _secrets.token_hex(8)
                  # Paranoia — if the random delimiter somehow clashes
                  # with the value, regenerate.
                  while delim in v:
                      delim = "EOF_" + _secrets.token_hex(8)
                  f.write(f"{k}<<{delim}\n{v}\n{delim}\n")

          # Diagnostic: lengths only, never values. Lengths help us
          # verify the right password made it through without revealing
          # anything meaningful in the log.
          print("Unpacked CREDS keys (value lengths only):")
          for k in sorted(parsed):
              print(f"  {k}: len={len(parsed[k])}")
          PY

      - name: Run scraper
        # scraper.py writes results/latest/ and results/history/<stamp>/.
        # On non-zero exit the job fails and nothing is committed — the
        # prior snapshot stays authoritative until the next successful run.
        # Credentials are inherited from $GITHUB_ENV set in the previous
        # step; config.py's os.getenv() picks them up directly, and
        # python-dotenv's load_dotenv() is a no-op (it never overrides
        # existing env vars unless override=True is passed).
        shell: bash
        run: |
          set -e
          python scraper.py

      - name: Summarize fresh run
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("results/latest/run.json")
          if not p.exists():
              print("run.json missing — scraper likely failed")
              raise SystemExit(1)
          data = json.loads(p.read_text())
          print("run stamp:", data.get("run_stamp"))
          for name, rows in (data.get("data") or {}).items():
              plans = sum(1 for r in rows if (r.get("plan") or "").strip())
              print(f"  {name}: {len(rows)} rows, plan populated {plans}/{len(rows)}")
          PY

      - name: Commit results back to main
        run: |
          git config user.name "chap-scraper-bot"
          git config user.email "chap-scraper-bot@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No changes in results/ — skipping commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d_%H-%M-%SZ")
          git commit -m "chore(data): scrape ${STAMP}"
          git push origin HEAD:main

      - name: Upload logs + debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_id }}
          path: |
            debug_dom_*.txt
            error_*.png
            logs/
          if-no-files-found: ignore
          retention-days: 14
