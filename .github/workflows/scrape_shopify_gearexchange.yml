# =============================================================================
#  Auto-generated per-app scrape workflow for shopify_gearexchange.
#  Runs on its OWN cron (daily at 00:00 IST) so it doesn't stack with the
#  shared scrape.yml. Generated by the admin UI — if you edit by hand,
#  re-onboarding the app will overwrite your changes.
# =============================================================================

name: scrape-shopify_gearexchange

on:
  schedule:
    - cron: "30 18 * * *"   # daily at 00:00 IST
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual run?"
        required: false
        default: "on-demand"

concurrency:
  group: scrape-shopify_gearexchange-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape Shopify GearExchange (shopify_gearexchange)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Unpack repo secrets into job env
        shell: bash
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -e
          python - <<'PY'
          import os, json, sys, secrets as _secrets
          data = json.loads(os.environ.get("SECRETS_JSON") or "{}")
          required = ["LOGIN_URL", "SHOPIFY_GEAREXCHANGE_USER_placeholder", "SHOPIFY_GEAREXCHANGE_PASS_placeholder"]
          # Derive the real required keys from apps.yaml so this file
          # doesn't hardcode APP_N_* for the specific app.
          import yaml
          try:
              registry = yaml.safe_load(open("apps.yaml")) or {}
          except Exception as err:
              print(f"::error::Couldn't read apps.yaml: {err}")
              sys.exit(1)
          required = ["LOGIN_URL"]
          for app in (registry.get("apps") or []):
              if app.get("id") != "shopify_gearexchange":
                  continue
              ref = (app.get("creds_ref") or "").strip()
              if ref:
                  required.extend([f"{ref}_USER", f"{ref}_PASS"])
          unpacked = {k: data[k] for k in required if data.get(k)}
          missing = [k for k in required if not unpacked.get(k)]
          if missing:
              print(f"::error::Missing required secrets: {', '.join(missing)}")
              sys.exit(1)
          gh_env = os.environ.get("GITHUB_ENV")
          with open(gh_env, "a", encoding="utf-8") as f:
              for k, v in unpacked.items():
                  delim = "EOF_" + _secrets.token_hex(8)
                  while delim in (v or ""):
                      delim = "EOF_" + _secrets.token_hex(8)
                  f.write(f"{k}<<{delim}\n{v}\n{delim}\n")
          print("Unpacked keys (value lengths only):")
          for k in sorted(unpacked):
              print(f"  {k}: len={len(unpacked[k])}")
          PY

      - name: Run scraper (target=shopify_gearexchange)
        shell: bash
        env:
          TARGET_APP: "shopify_gearexchange"
        run: |
          set -e
          python scraper.py

      - name: Commit results back to main
        run: |
          git config user.name "chap-scraper-bot"
          git config user.email "chap-scraper-bot@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No changes in results/ — skipping commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d_%H-%M-%SZ")
          git commit -m "chore(data): scrape shopify_gearexchange ${STAMP}"
          git push origin HEAD:main

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-shopify_gearexchange-debug-${{ github.run_id }}
          path: |
            debug_dom_*.txt
            error_*.png
          if-no-files-found: ignore
          retention-days: 14
